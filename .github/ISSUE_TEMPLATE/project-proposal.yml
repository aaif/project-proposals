---
name: Project Proposal
description: Apply for your project to become an official Project (Growth or Impact) under the Agentic AI Foundation (AAIF)
title: "[Project Proposal] <Project Name> "
labels: ["New"]
assignees:
  - christinaharter
  - maniksurtani
body:
  - type: markdown
    attributes:
      value: |
        > Thanks for applying to become an AAIF Hosted Project. This designation is for open source projects that demonstrate maturity, wide adoption, strong community engagement, and alignment with the AAIF ecosystem.

        Curious to know more about what we're looking for in a project? Check out the guide on [How to Submit your Project to the AAIF](https://aaif.io/blog/how-to-submit-your-project-to-the-aaif/) for more details.
        
        Please complete the application below to help the AAIF Technical Committee (TC) evaluate your readiness for foundation hosting.

        Based on the information in this form, a Contribution Agreement will be sent to the contacts provided. **This must be signed before the Governing Board (GB) can complete a vote on whether to accept the project.** It will be countersigned by the Linux Foundation only after a successful vote.

        > [!CAUTION]
        > Both the TC and GB MUST vote to approve your application and a Contribution Agreement MUST be signed before your project can be considered an official AAIF project. You can not represent your project as "donated" or "contributed" until those steps are completed.

        <br />

        ---


        # Project Proposal Form

        Please fill out the form below as completely as possible. This information will help facilitate the review by the AAIF TC and GB.

  - type: input
    attributes:
      label: Project Name
      description: "The official name of the project."
    validations:
      required: true

  - type: textarea
    attributes:
      label: Project Description
      description: "Describe what the project does, why it is valuable, origin, and history."
      placeholder: "What the project does, why it is valuable, its origin and history."
    validations:
      required: true

  - type: textarea
    attributes:
      label: Alignment with AAIF Mission
      description: "Describe how the project aligns with AAIF's mission."
    validations:
      required: true

  - type: textarea
    attributes:
      label: Relation to Existing AAIF Projects
      description: "Describe how the project relates to existing AAIF projects."
    validations:
      required: true

  - type: textarea
    attributes:
      label: Example Use Cases and Evidence of Adoption
      description: |
        Describe real-world usage.
        Provide evidence of production deployments in at least two different organizations.
    validations:
      required: true

  - type: input
    attributes:
      label: Technical Committee Sponsor (if identified)
      description: "While not required, a Technical Committee sponsor helps mentor projects."
    validations:
      required: false

  - type: input
    attributes:
      label: GitHub Repository URL
      description: "URL of the main code repository for the project."
    validations:
      required: true

  - type: input
    attributes:
      label: License
      description: "Name of the OSI-approved permissive license under which the project is released."
      placeholder: "Example: Apache 2.0"
    validations:
      required: true

  - type: textarea
    attributes:
      label: Governance Model
      description: "Link to or provide a description of the project's current governance model (e.g., LF Minimum Viable Governance)."
    validations:
      required: true

  - type: textarea
    attributes:
      label: CI/CD & Release Workflow
      description: |
        Describe how your project is built, tested, and released.
        Include any CI systems and frequency of releases.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Public-Facing Contribution Process for Specifications
      description: "Link to or provide a description of the project's current contribution process for specifications."
    validations:
      required: true

  - type: textarea
    attributes:
      label: Publicly Accessible Issue Tracker
      description: "Link to the project's publicly accessible issue tracker."
    validations:
      required: true

  - type: textarea
    attributes:
      label: External Project Dependencies 
      description: "Please list any external project dependencies, including licenses for those projects."
    validations:
      required: true

  - type: textarea
    attributes:
      label: Maintainers & Contributors
      description: "Provide names, GitHub handles, and affiliations for at least 2 core maintainers from different organizations and at least 10 contributors."
    validations:
      required: true

  - type: textarea
    attributes:
      label: Leadership Team & Decision Process
      description: "Please provide a list of the project's leadership team and a description of their decision-making process."
    validations:
      required: true

  - type: textarea
    attributes:
      label: Roadmap
      description: "Link to or provide a 12-month public roadmap for the project, if available."
    validations:
      required: false

  - type: textarea
    attributes:
      label: Security
      description: "If the project has an OpenSSF Best Practices badge, link it here. Otherwise, describe the project's current security posture."
    validations:
      required: false

  - type: input
    attributes:
      label: Website URL
      description: "URL of the project website or documentation portal."
    validations:
      required: true

  - type: textarea
    attributes:
      label: Documented Governance Practices (if any)
      description: "Link to any documented governance practices, if any (i.e. GOVERNANCE.md)."
    validations:
      required: false

  - type: input
    attributes:
      label: Links to Social Media Accounts
      description: "Please link to any existing social media accounts, if any."
    validations:
      required: false

  - type: checkboxes
    id: trademark
    attributes:
      label: Trademark and accounts
      description: By submitting this issue, you understand that if accepted, all project trademarks (such as the project name) and accounts will be donated to the AAIF. For more information please refer to Section 8 of the [AAIF Foundation Charter](https://github.com/aaif/foundation/blob/main/charter.md).
      options:
        - label: If the project is accepted, I agree to donate all project trademarks and accounts to the AAIF.
          required: true

  - type: textarea
    attributes:
      label: Details of Existing Financial Sponsorship
      description: "Please provide details of existing financial sponsorship, if any."
    validations:
      required: false

  - type: textarea
    attributes:
      label: Infrastructure Needs or Requests
      description: "Please provide any infrastructure needs or requests, if any."
    validations:
      required: false

  - type: textarea
    attributes:
      label: Additional Information
      description: "Any other details the Technical Committee should know when reviewing this application."
    validations:
      required: false


  - type: markdown
    attributes:
      value: |
        <br />

        ## :envelope: Contact information

        Provide information about who to contact with questions about the project and who will sign the Contribution Agreement.

  - type: textarea
    attributes:
      label: Application contact name(s) and email(s)
      description: Provide the name(s) and email address(es) of individuals who should be contacted regarding this application. If more than one name and email is provided, please comma separate them.
      placeholder: Comma-separate multiple emails here
    validations:
      required: true

  - type: textarea
    attributes:
      label: Contributing or sponsoring entity signatory information
      description: Provide the email address(es) of the project's contributing or sponsoring company/organization or group of individuals. This is the person or people that would sign the Contribution Agreement which assigns trademarks (if any), domains, and accounts to the Linux Foundation.
      value: "If an organization:\n| Name | Address | Type (e.g., Delaware corporation) | Signatory name and title | Email address |\n|-----------|-----------|-----------|-----------|-----------|\n|            |            |            |            |            |\n\nOr, if an individual or individual(s):\n| Name | Country | Email address |\n|-----------|-----------|-----------|\n|            |            |            |\n|            |            |            |\n|            |            |            |"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        <br />
